<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VSA Waves</title>
<link rel="manifest" href="/vsa-mobile-dashboard/manifest.json">
<meta name="theme-color" content="#090b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VSA Waves">
<link rel="apple-touch-icon" href="/vsa-mobile-dashboard/icon.svg">
<style>
:root {
  --bg:     #090b0f;
  --bg2:    #0f1117;
  --border: #252d3d;
  --bd2:    #2e3a50;
  --text:   #c8d4e8;
  --text2:  #7a8fa8;
  --accent: #3d8ef0;
  --up:     #3df07a;
  --dn:     #f03d3d;
  --gold:   #f0c93d;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; width:100%; overflow:hidden; background:var(--bg); color:var(--text);
            font-family:"SF Mono","Fira Code","Consolas",monospace; }

#app { display:flex; flex-direction:column; height:100dvh; width:100%; overflow:hidden; }

/* Header */
.header { height:44px; min-height:44px; background:var(--bg2); border-bottom:1px solid var(--border);
          display:flex; align-items:center; padding:0 10px; gap:8px; flex-shrink:0; }
.hlogo  { font-size:10px; font-weight:700; letter-spacing:.2em; color:var(--text2);
          padding-right:8px; border-right:1px solid var(--border); flex-shrink:0; }
.htitle { font-size:11px; color:var(--accent); letter-spacing:.06em; flex:1; }
.hback  { font-size:10px; color:var(--text2); text-decoration:none; padding:4px 8px;
          border:1px solid var(--border); border-radius:3px; flex-shrink:0; transition:all .12s; }
.hback:hover { color:var(--accent); border-color:var(--accent); }
.sdot   { width:6px; height:6px; border-radius:50%; background:var(--bd2); flex-shrink:0;
          transition:background .3s,box-shadow .3s; }
.sdot.live { background:#3df07a; box-shadow:0 0 7px #3df07a; }

/* Controls */
.ctrl { height:44px; min-height:44px; background:var(--bg2); border-bottom:1px solid var(--border);
        display:flex; align-items:center; padding:0 8px; gap:6px; flex-shrink:0;
        overflow-x:auto; -webkit-overflow-scrolling:touch; }
.ctrl::-webkit-scrollbar { display:none; }
.clbl { font-size:10px; color:var(--text2); white-space:nowrap; flex-shrink:0; }
select { background:var(--bg); border:1px solid var(--border); color:var(--text);
         font-family:inherit; font-size:10px; border-radius:3px; padding:4px 6px;
         -webkit-appearance:none; flex-shrink:0; }
select:focus { outline:none; border-color:var(--accent); }
.tab { height:28px; padding:0 11px; border-radius:3px; border:1px solid var(--border);
       background:var(--bg); color:#a0b4cc; font-family:inherit; font-size:10px;
       font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all .12s; }
.tab.on { background:var(--accent); border-color:var(--accent); color:#fff; }
.tab:hover:not(.on) { border-color:var(--accent); color:var(--accent); }
.sep { width:1px; height:18px; background:var(--border); flex-shrink:0; margin:0 2px; }
#tv  { font-size:11px; color:var(--gold); min-width:34px; flex-shrink:0; }
input[type=range] { -webkit-appearance:none; width:80px; height:3px; border-radius:2px;
                    background:var(--bd2); flex-shrink:0; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px;
                    border-radius:50%; background:var(--accent); cursor:pointer; }

/* Stats */
.stats { height:28px; min-height:28px; display:flex; align-items:center; gap:14px;
         padding:0 10px; font-size:10px; border-bottom:1px solid var(--border);
         flex-shrink:0; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.stats::-webkit-scrollbar { display:none; }
.st { color:var(--text2); white-space:nowrap; }
.st b { font-weight:normal; color:var(--text); }

/* Charts area — price + drag + volume */
#charts { flex:1; min-height:0; display:flex; flex-direction:column; position:relative; overflow:hidden; }
#price-panel { flex:1; min-height:0; overflow:hidden; position:relative; }
#drag  { height:10px; min-height:10px; background:var(--bg2); border-top:1px solid var(--border);
         border-bottom:1px solid var(--border); display:flex; align-items:center;
         justify-content:center; cursor:row-resize; flex-shrink:0;
         user-select:none; -webkit-user-select:none; touch-action:none; }
.grip  { width:22px; height:2px; background:var(--bd2); border-radius:1px; }
#vol-panel { height:22%; min-height:60px; max-height:45%; overflow:hidden; flex-shrink:0; }

/* Wave detail panel */
#panel { position:absolute; top:8px; right:8px; z-index:20; background:#0f1117f0;
         border:1px solid var(--border); border-radius:5px; padding:10px 12px;
         font-size:10px; min-width:195px; display:none;
         -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
#pcl { float:right; cursor:pointer; color:var(--text2); font-size:15px; line-height:1; }
#pcl:hover { color:var(--text); }
#ptitle { font-size:12px; font-weight:700; margin-bottom:8px; display:block; }
.pr { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #1a2030; }
.pr span:first-child { color:var(--text2); }

/* Wave chips */
#wlist { height:36px; min-height:36px; display:flex; align-items:center; gap:4px;
         padding:0 8px; flex-shrink:0; background:var(--bg2); border-top:1px solid var(--border);
         overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch;
         scrollbar-width:thin; scrollbar-color:var(--border) var(--bg2); }
#wlist::-webkit-scrollbar { height:2px; }
#wlist::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:1px; }
.chip { font-size:10px; padding:3px 9px; border-radius:3px; cursor:pointer;
        border:1px solid var(--border); white-space:nowrap; flex-shrink:0;
        font-family:inherit; background:transparent; transition:all .12s; }
.chip.up { background:#051a0a; border-color:#1a5c28; color:var(--up); }
.chip.dn { background:#1a0505; border-color:#5c1a1a; color:var(--dn); }
.chip.act { border-color:var(--gold)!important; color:var(--gold)!important; }

/* Loading overlay */
.overlay { position:absolute; inset:0; background:var(--bg); display:flex;
           align-items:center; justify-content:center; flex-direction:column;
           gap:10px; z-index:30; }
.overlay.hidden { display:none; }
.spinner { width:22px; height:22px; border:2px solid var(--border);
           border-top-color:var(--accent); border-radius:50%;
           animation:spin .5s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ltxt { font-size:10px; color:var(--text2); letter-spacing:.12em; }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px);
         background:#3d1515; border:1px solid #7a2020; color:#ff8080;
         font-size:10px; padding:7px 14px; border-radius:5px; letter-spacing:.06em;
         transition:transform .25s; z-index:100; white-space:nowrap; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* Portrait — controls + chips + header go to bottom */
@media (orientation:portrait) {
  #app        { flex-direction:column; }
  .header     { order:6; border-top:1px solid var(--border); border-bottom:none; }
  .ctrl       { order:5; border-top:1px solid var(--border); border-bottom:none; }
  .stats      { order:4; border-top:1px solid var(--border); border-bottom:none; }
  #wlist      { order:3; border-top:none; border-bottom:1px solid var(--border); }
  #charts     { order:1; flex:1; }
}
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="hlogo">VSA</div>
    <div class="htitle">GC JUN26 &nbsp;&#183;&nbsp; Renko 4-pip &nbsp;&#183;&nbsp; Waves</div>
    <div class="sdot" id="ldot"></div>
    <a class="hback" href="/vsa-mobile-dashboard/">&#8592; Chart</a>
  </div>

  <div class="ctrl">
    <span class="clbl">Session</span>
    <select id="sel">
      <option value="last1h">Last 1 Hr</option>
      <option value="last2h">Last 2 Hr</option>
      <option value="last4h">Last 4 Hr</option>
      <option value="london" selected>London AM</option>
      <option value="ny">NY PM</option>
      <option value="today">Full Day</option>
    </select>
    <div class="sep"></div>
    <span class="clbl">Min $</span>
    <input type="range" id="thr" min="1" max="15" step="0.5" value="3">
    <span id="tv">$3.00</span>
    <div class="sep"></div>
    <button class="tab on"  id="btn-load">&#x21ba; Load</button>
    <button class="tab on"  id="btn-sma">SMA</button>
    <button class="tab"     id="btn-bb">BB</button>
    <button class="tab on"  id="btn-vol">Vol</button>
  </div>

  <div class="stats">
    <span class="st">Bricks <b id="sb">–</b></span>
    <span class="st">Waves <b id="sw">–</b></span>
    <span class="st">Range <b id="sr">–</b></span>
    <span class="st">Biggest <b id="sg">–</b></span>
  </div>

  <div id="charts">
    <div id="price-panel">
      <div id="pchart" style="width:100%;height:100%;"></div>
      <div id="panel">
        <span id="pcl" onclick="document.getElementById('panel').style.display='none'">&#x2715;</span>
        <span id="ptitle"></span>
        <div id="pbody"></div>
      </div>
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="ltxt" id="ltxt">CONNECTING...</div>
      </div>
    </div>
    <div id="drag"><div class="grip"></div></div>
    <div id="vol-panel">
      <div id="vchart" style="width:100%;height:100%;"></div>
    </div>
  </div>

  <div id="wlist"></div>

</div>
<div class="toast" id="toast"></div>
